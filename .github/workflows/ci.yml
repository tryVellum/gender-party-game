name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff format
        run: python -m ruff format --check app.py config.py database.py init_env.py launcher.py runtime_paths.py version.py build/generate_version_info.py tests

      - name: Ruff lint
        run: python -m ruff check app.py config.py database.py init_env.py launcher.py runtime_paths.py version.py build/generate_version_info.py tests

      - name: Tests
        run: python -m pytest -q
